<!--
Used for: Registration page UI.
Information inside: Placeholder registration form and template variables (e.g., validation errors).
-->

{% extends "base.html" %}

{% block content %}
  <section class="auth-card">
    <h2>Create Account</h2>
    <p class="auth-subtitle">Set up your profile so we can personalize your tracking.</p>

    {% if error %}
      <p class="error">{{ error }}</p>
    {% endif %}

    <form class="auth-form" method="post" action="/register">
      <label>
        Username
        <input type="text" name="username" autocomplete="username" required />
      </label>
      <label>
        Email
        <input type="email" name="email" autocomplete="email" required />
      </label>
      <label>
        Password
        <input type="password" name="password" autocomplete="new-password" required />
      </label>
      <label>
        First name
        <input type="text" name="first_name" autocomplete="given-name" required />
      </label>
      <label>
        Last name
        <input type="text" name="last_name" autocomplete="family-name" required />
      </label>
      <label>
        Date of birth
        <input type="date" name="date_of_birth" required />
      </label>
      <label>
        Gender
        <select name="gender" required>
          <option value="">Select...</option>
          <option value="male">male</option>
          <option value="female">female</option>
          <option value="other">other</option>
        </select>
      </label>
      <label>
        Height (inches)
        <input type="number" name="height_inches" min="1" max="119" required />
      </label>

      <div class="btn-row">
        <button class="btn btn-primary" type="submit">Create account</button>
      </div>
    </form>

    <p class="helper-text">Already have an account?</p>
    <form method="get" action="/login">
      <button class="btn btn-secondary" type="submit">Back to login</button>
    </form>
  </section>
{% endblock %}
