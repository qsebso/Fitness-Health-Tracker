<!--
Used for: Registration page UI.
Information inside: Placeholder registration form and template variables (e.g., validation errors).
-->

{% extends "base.html" %}

{% block content %}
  <h2>Register</h2>

  <form method="post" action="/register">
    <label>
      Username
      <input type="text" name="username" />
    </label>
    <label>
      Password
      <input type="password" name="password" />
    </label>
    <label>
      Email (optional)
      <input type="email" name="email" />
    </label>
    <button type="submit">Create account</button>
  </form>

  {% if error %}
    <p class="error">{{ error }}</p>
  {% endif %}
{% endblock %}
