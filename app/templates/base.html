<!--
Used for: Site-wide HTML layout (shared <head>, navigation, and page blocks).
Information inside: Jinja blocks (e.g., `content`) for child templates to fill in.
-->

<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ title or "Fitness Trend Tracking System" }}</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <header class="app-header">
      <div class="header-row">
        <h1>Fitness Trend Tracking System</h1>
        <nav class="top-nav">
          {% if request.session.get("user_id") %}
            <a href="/">Dashboard</a>
            <a href="/checkins">Check-ins</a>
            <a href="/metrics">Metrics</a>
            <a href="/nutrition">Nutrition</a>
            <a href="/workouts">Workouts</a>
            <a href="/goals">Goals</a>
            <a href="/groups">Groups</a>
            <a href="/achievements">Achievements</a>
            <form method="post" action="/logout">
              <button class="btn btn-secondary" type="submit">Logout</button>
            </form>
          {% else %}
            <a href="/login">Login</a>
            <a href="/register">Create Account</a>
          {% endif %}
        </nav>
      </div>
    </header>

    <main class="app-main">
      {% block content %}{% endblock %}
    </main>

    <script src="/static/app.js"></script>
    {% block scripts %}{% endblock %}
  </body>
</html>
